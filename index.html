<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Diff Checker - Text Comparison Tool</title>
<meta name="description" content="Free online text diff checker. Compare texts side by side with line-by-line and word-by-word diff modes.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--sf:#1e2746;--sf2:#253256;--tx:#e0e0e0;--tx2:#a0a0b0;--ac:#4fc3f7;--gn:#4caf50;--gb:rgba(76,175,80,.18);--rd:#f44336;--rb:rgba(244,67,54,.18);--yl:#ffb74d;--yb:rgba(255,183,77,.15);--bd:#2a3a5c;--r:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--bg2);border-bottom:1px solid var(--bd);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
h1{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,var(--ac),#e040fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
h1 span{font-size:.8rem;font-weight:400;-webkit-text-fill-color:var(--tx2);margin-left:8px}
.tb{display:flex;gap:8px;flex-wrap:wrap}
.tb button{background:var(--sf2);color:var(--tx);border:1px solid var(--bd);padding:7px 14px;border-radius:var(--r);cursor:pointer;font-size:.82rem;transition:all .2s}
.tb button:hover{background:var(--bg3);border-color:var(--ac)}
.tb button.on{background:var(--bg3);border-color:var(--ac);color:var(--ac)}
.mt{display:flex}.mt button{border-radius:0}.mt button:first-child{border-radius:var(--r) 0 0 var(--r)}.mt button:last-child{border-radius:0 var(--r) var(--r) 0}
.stats{display:flex;gap:16px;padding:10px 24px;background:var(--bg2);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.st{font-size:.82rem;color:var(--tx2);display:flex;align-items:center;gap:6px}
.st b{color:var(--tx);font-size:.95rem}
.st.g b{color:var(--gn)}.st.r b{color:var(--rd)}.st.y b{color:var(--yl)}.st.b b{color:var(--ac)}
main{flex:1;display:flex;flex-direction:column;padding:16px;gap:16px;overflow:hidden}
.eds{display:flex;gap:16px;flex:1;min-height:0}
.ep{flex:1;display:flex;flex-direction:column;min-width:0}
.ep label{font-size:.82rem;color:var(--tx2);margin-bottom:6px}
.ep textarea{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px;color:var(--tx);font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.85rem;resize:none;line-height:1.6;outline:none}
.ep textarea:focus{border-color:var(--ac)}
#diffOut{flex:1;display:none;overflow:auto;min-height:0}
#diffOut.show{display:flex;gap:16px}
#diffOut.show~.eds{display:none}
.dc{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:auto;min-width:0}
.dc h3{position:sticky;top:0;background:var(--sf2);padding:8px 12px;font-size:.82rem;color:var(--tx2);border-bottom:1px solid var(--bd);z-index:1}
.dl{display:flex;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.83rem;line-height:1.7;border-bottom:1px solid rgba(255,255,255,.03)}
.dl .n{min-width:40px;text-align:right;padding:0 8px;color:var(--tx2);opacity:.5;user-select:none}
.dl .c{flex:1;padding:0 8px;white-space:pre-wrap;word-break:break-all}
.dl.a{background:var(--gb)}.dl.a .n{color:var(--gn);opacity:1}
.dl.d{background:var(--rb)}.dl.d .n{color:var(--rd);opacity:1}
.dl.m{background:var(--yb)}.dl.m .n{color:var(--yl);opacity:1}
.dl.e{opacity:.3}
mark.a{background:rgba(76,175,80,.4);color:#c8e6c9;border-radius:2px;padding:0 1px}
mark.d{background:rgba(244,67,54,.4);color:#ffcdd2;border-radius:2px;padding:0 1px;text-decoration:line-through}
footer{text-align:center;padding:12px;font-size:.75rem;color:var(--tx2);border-top:1px solid var(--bd)}
@media(max-width:768px){.eds,#diffOut.show{flex-direction:column}.stats{gap:8px;padding:8px 16px}header{padding:12px 16px}main{padding:10px}}
</style>
</head>
<body>
<header>
<h1>AI Diff Checker <span>Text Comparison Tool</span></h1>
<div class="tb">
<div class="mt">
<button id="btnL" class="on" onclick="setMode('line')">Line Diff</button>
<button id="btnW" onclick="setMode('word')">Word Diff</button>
</div>
<button onclick="loadSample()">&#x1f4cb; Sample</button>
<button onclick="swapTexts()">&#x1f504; Swap</button>
<button onclick="clearAll()">&#x1f5d1; Clear</button>
<button id="btnCmp" onclick="compare()">&#x25b6; Compare</button>
<button id="btnEd" style="display:none" onclick="backToEdit()">&#x270f;&#xfe0f; Edit</button>
</div>
</header>
<div class="stats" role="status" aria-live="polite">
<div class="st">Lines: <b id="sL">0 / 0</b></div>
<div class="st">Words: <b id="sW">0 / 0</b></div>
<div class="st g">Added: <b id="sA">0</b></div>
<div class="st r">Removed: <b id="sR">0</b></div>
<div class="st y">Modified: <b id="sM">0</b></div>
<div class="st b">Similarity: <b id="sS">100%</b></div>
</div>
<main>
<div id="diffOut"><div class="dc"><h3>Original</h3><div id="diffL"></div></div><div class="dc"><h3>Modified</h3><div id="diffR"></div></div></div>
<div class="eds">
<div class="ep"><label>Original Text</label><textarea id="tA" placeholder="Paste original text here..."></textarea></div>
<div class="ep"><label>Modified Text</label><textarea id="tB" placeholder="Paste modified text here..."></textarea></div>
</div>
</main>
<footer>AI Diff Checker &mdash; Free Online Text Comparison Tool</footer>
<script>
let mode='line';
function setMode(m){mode=m;document.getElementById('btnL').className=m==='line'?'on':'';document.getElementById('btnW').className=m==='word'?'on':'';if(document.getElementById('diffOut').classList.contains('show'))compare();}
function swapTexts(){let a=document.getElementById('tA'),b=document.getElementById('tB'),t=a.value;a.value=b.value;b.value=t;}
function clearAll(){document.getElementById('tA').value='';document.getElementById('tB').value='';backToEdit();updateStats('','');}
function loadSample(){document.getElementById('tA').value='The quick brown fox jumps over the lazy dog.\nHello World!\nThis line will be removed.\nThis line stays the same.\nFoo Bar Baz';document.getElementById('tB').value='The quick brown cat jumps over the lazy dog.\nHello Beautiful World!\nThis line stays the same.\nThis is a new line.\nFoo Qux Baz';backToEdit();}
function backToEdit(){document.getElementById('diffOut').classList.remove('show');document.getElementById('btnCmp').style.display='';document.getElementById('btnEd').style.display='none';}
function updateStats(a,b){var la=a?a.split('\n'):[];var lb=b?b.split('\n'):[];var wa=a?a.trim().split(/\s+/).filter(Boolean):[];var wb=b?b.trim().split(/\s+/).filter(Boolean):[];document.getElementById('sL').textContent=la.length+' / '+lb.length;document.getElementById('sW').textContent=wa.length+' / '+wb.length;}

function lcs(a,b){var m=a.length,n=b.length,dp=[];for(var i=0;i<=m;i++){dp[i]=[];for(var j=0;j<=n;j++)dp[i][j]=0;}for(var i=1;i<=m;i++)for(var j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);var res=[],i=m,j=n;while(i>0&&j>0){if(a[i-1]===b[j-1]){res.unshift({t:'eq',a:i-1,b:j-1});i--;j--;}else if(dp[i-1][j]>=dp[i][j-1])i--;else j--;}return res;}

function diffLines(a,b){var la=a.split('\n'),lb=b.split('\n'),common=lcs(la,lb),ops=[],ai=0,bi=0;for(var k=0;k<common.length;k++){var c=common[k];while(ai<c.a&&bi<c.b){ops.push({t:'mod',a:la[ai],b:lb[bi],ai:ai,bi:bi});ai++;bi++;}while(ai<c.a){ops.push({t:'del',a:la[ai],ai:ai});ai++;}while(bi<c.b){ops.push({t:'add',b:lb[bi],bi:bi});bi++;}ops.push({t:'eq',a:la[ai],b:lb[bi],ai:ai,bi:bi});ai++;bi++;}while(ai<la.length&&bi<lb.length){ops.push({t:'mod',a:la[ai],b:lb[bi],ai:ai,bi:bi});ai++;bi++;}while(ai<la.length){ops.push({t:'del',a:la[ai],ai:ai});ai++;}while(bi<lb.length){ops.push({t:'add',b:lb[bi],bi:bi});bi++;}return ops;}

function diffWords(sa,sb){var a=sa.split(/(\s+)/),b=sb.split(/(\s+)/),common=lcs(a,b),html_l='',html_r='',ai=0,bi=0;for(var k=0;k<common.length;k++){var c=common[k];while(ai<c.a){html_l+='<mark class="d">'+esc(a[ai])+'</mark>';ai++;}while(bi<c.b){html_r+='<mark class="a">'+esc(b[bi])+'</mark>';bi++;}html_l+=esc(a[ai]);html_r+=esc(b[bi]);ai++;bi++;}while(ai<a.length){html_l+='<mark class="d">'+esc(a[ai])+'</mark>';ai++;}while(bi<b.length){html_r+='<mark class="a">'+esc(b[bi])+'</mark>';bi++;}return{l:html_l,r:html_r};}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function compare(){var a=document.getElementById('tA').value,b=document.getElementById('tB').value;updateStats(a,b);var ops=diffLines(a,b),lhtml='',rhtml='',added=0,removed=0,modified=0,total=0;
for(var i=0;i<ops.length;i++){var o=ops[i];total++;if(o.t==='eq'){lhtml+=line('',o.ai+1,esc(o.a));rhtml+=line('',o.bi+1,esc(o.b));}else if(o.t==='del'){removed++;lhtml+=line('d',o.ai+1,esc(o.a));rhtml+=line('e','','');}else if(o.t==='add'){added++;lhtml+=line('e','','');rhtml+=line('a',o.bi+1,esc(o.b));}else if(o.t==='mod'){modified++;if(mode==='word'){var w=diffWords(o.a,o.b);lhtml+=line('m',o.ai+1,w.l);rhtml+=line('m',o.bi+1,w.r);}else{lhtml+=line('d',o.ai+1,esc(o.a));rhtml+=line('a',o.bi+1,esc(o.b));}}}
document.getElementById('diffL').innerHTML=lhtml;document.getElementById('diffR').innerHTML=rhtml;document.getElementById('diffOut').classList.add('show');document.getElementById('btnCmp').style.display='none';document.getElementById('btnEd').style.display='';
document.getElementById('sA').textContent=added;document.getElementById('sR').textContent=removed;document.getElementById('sM').textContent=modified;
var sim=total>0?Math.round((total-added-removed-modified)/total*100):100;document.getElementById('sS').textContent=sim+'%';}

function line(cls,num,content){return '<div class="dl'+(cls?' '+cls:'')+'"><span class="n">'+num+'</span><span class="c">'+(content||'&nbsp;')+'</span></div>';}
</script>
<script src="https://alwingulla.com/88/tag.min.js" data-zone="130747" async data-cfasync="false"></script>
</body>
</html>
