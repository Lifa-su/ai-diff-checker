<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Diff Checker - Text Compare Tool</title>
<meta name="description" content="Compare two texts side by side with highlighted differences.">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--sf:#161b22;--sf2:#1c2333;--bd:#30363d;--tx:#e6edf3;--tx2:#8b949e;--ac:#58a6ff;--gbg:rgba(46,160,67,.25);--gt:#3fb950;--rbg:rgba(248,81,73,.25);--rt:#f85149;--ybg:rgba(210,153,34,.2);--yt:#d29922;--r:12px;--m:'SF Mono','Cascadia Code','Fira Code',monospace}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
.hd{text-align:center;padding:2rem 1rem 1rem}
.hd h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#58a6ff,#bc8cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hd p{color:var(--tx2);margin-top:.4rem;font-size:.9rem}
.ct{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center;align-items:center;padding:.75rem 1.5rem}
.ct label{display:flex;align-items:center;gap:.4rem;color:var(--tx2);font-size:.85rem;cursor:pointer}
.ct input[type=checkbox]{accent-color:var(--ac);width:16px;height:16px}
.btn{background:var(--ac);color:#fff;border:none;padding:.55rem 1.4rem;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn-o{background:transparent;border:1px solid var(--bd);color:var(--tx2)}
.btn-o:hover{border-color:var(--ac);color:var(--ac)}
.ss{display:flex;gap:1rem;justify-content:center;padding:.5rem 1rem;flex-wrap:wrap}
.st{display:flex;align-items:center;gap:.35rem;font-size:.85rem;color:var(--tx2);padding:.3rem .7rem;background:var(--sf);border-radius:20px;border:1px solid var(--bd)}
.st .d{width:8px;height:8px;border-radius:50%}.st .n{font-weight:700}
.da{background:var(--gt)}.dd{background:var(--rt)}.dm{background:var(--yt)}
.ew{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bd);margin:1rem;border-radius:var(--r);overflow:hidden;min-height:350px}
.ep{display:flex;flex-direction:column;background:var(--sf)}
.ph{padding:.6rem 1rem;font-size:.8rem;font-weight:600;color:var(--tx2);background:var(--sf2);border-bottom:1px solid var(--bd)}
.ep textarea{flex:1;background:transparent;color:var(--tx);border:none;padding:1rem;font-family:var(--m);font-size:.85rem;line-height:1.7;resize:none;outline:none}
.ep textarea::placeholder{color:var(--tx2);opacity:.5}
.dw{margin:0 1rem 1rem;border-radius:var(--r);overflow:hidden;border:1px solid var(--bd);display:none}
.dw.show{display:block}
.dh{display:grid;grid-template-columns:1fr 1fr;background:var(--sf2);border-bottom:1px solid var(--bd)}
.dh div{padding:.6rem 1rem;font-size:.8rem;font-weight:600;color:var(--tx2)}
.dh div+div{border-left:1px solid var(--bd)}
.db{max-height:60vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
.dr{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--bd)}
.dr:last-child{border-bottom:none}
.dc{display:flex;align-items:stretch;min-height:1.7em;font-family:var(--m);font-size:.83rem;line-height:1.7}
.dc+.dc{border-left:1px solid var(--bd)}
.ln{width:3rem;flex-shrink:0;text-align:right;padding:0 .5rem;color:var(--tx2);opacity:.5;user-select:none;background:rgba(0,0,0,.15);display:flex;align-items:center;justify-content:flex-end;font-size:.75rem}
.lc{flex:1;padding:0 .75rem;white-space:pre-wrap;word-break:break-all;display:flex;align-items:center}
.dc.a{background:var(--gbg)}.dc.a .ln{color:var(--gt);opacity:.8}
.dc.r{background:var(--rbg)}.dc.r .ln{color:var(--rt);opacity:.8}
.dc.m{background:var(--ybg)}.dc.m .ln{color:var(--yt);opacity:.8}
.dc.e{background:var(--sf)}
.ca{background:rgba(46,160,67,.4);border-radius:3px;padding:0 1px}
.cr{background:rgba(248,81,73,.4);border-radius:3px;padding:0 1px}
.ft{text-align:center;padding:1.5rem;color:var(--tx2);font-size:.75rem;border-top:1px solid var(--bd);margin-top:auto}
@media(max-width:768px){.ew{grid-template-columns:1fr;margin:.5rem}.dw{margin:0 .5rem .5rem}.dh,.dr{grid-template-columns:1fr}.dc+.dc{border-left:none;border-top:1px solid var(--bd)}.hd h1{font-size:1.4rem}}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
</style>
</head>
<body>
<div class="hd"><h1>&#9878;&#65039; AI Diff Checker</h1><p>Paste two texts and compare them line by line</p></div>
<div class="ct">
<label><input type="checkbox" id="optWS"> Ignore whitespace</label>
<label><input type="checkbox" id="optCase"> Ignore case</label>
<button class="btn" onclick="runDiff()">Compare</button>
<button class="btn btn-o" onclick="clearAll()">Clear</button>
</div>
<div class="ss" id="stats"></div>
<div class="ew">
<div class="ep"><div class="ph">Original Text</div><textarea id="textA" placeholder="Paste original text here..."></textarea></div>
<div class="ep"><div class="ph">Modified Text</div><textarea id="textB" placeholder="Paste modified text here..."></textarea></div>
</div>
<div class="dw" id="diffWrap">
<div class="dh"><div>Original</div><div>Modified</div></div>
<div class="db" id="diffBody"></div>
</div>
<div class="ft">&copy; 2025 AI Diff Checker &mdash; Compare texts instantly.</div>
<script>
function lcs(a,b){
  var m=a.length,n=b.length,C=[];
  for(var i=0;i<=m;i++){C[i]=[];for(var j=0;j<=n;j++)C[i][j]=0;}
  for(i=1;i<=m;i++)for(j=1;j<=n;j++)
    C[i][j]=a[i-1]===b[j-1]?C[i-1][j-1]+1:Math.max(C[i-1][j],C[i][j-1]);
  var res=[],x=m,y=n;
  while(x>0&&y>0){
    if(a[x-1]===b[y-1]){res.unshift({t:'eq',ai:x-1,bi:y-1});x--;y--;}
    else if(C[x-1][y]>=C[x][y-1])x--;
    else y--;
  }
  return res;
}
function norm(s,ws,cs){
  if(ws)s=s.replace(/\s+/g,' ').trim();
  if(cs)s=s.toLowerCase();
  return s;
}
function charDiff(a,b){
  var ca=a.split(''),cb=b.split(''),eq=lcs(ca,cb);
  var ra=[],rb=[],ai=0,bi=0;
  for(var k=0;k<eq.length;k++){
    while(ai<eq[k].ai){ra.push('<span class="cr">');ra.push(esc(ca[ai]));ra.push('</span>');ai++;}
    while(bi<eq[k].bi){rb.push('<span class="ca">');rb.push(esc(cb[bi]));rb.push('</span>');bi++;}
    ra.push(esc(ca[ai]));rb.push(esc(cb[bi]));ai++;bi++;
  }
  while(ai<ca.length){ra.push('<span class="cr">');ra.push(esc(ca[ai]));ra.push('</span>');ai++;}
  while(bi<cb.length){rb.push('<span class="ca">');rb.push(esc(cb[bi]));rb.push('</span>');bi++;}
  return{left:ra.join(''),right:rb.join('')};
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function runDiff(){
  var ws=document.getElementById('optWS').checked;
  var cs=document.getElementById('optCase').checked;
  var lA=document.getElementById('textA').value.split('\n');
  var lB=document.getElementById('textB').value.split('\n');
  var nA=lA.map(function(s){return norm(s,ws,cs);});
  var nB=lB.map(function(s){return norm(s,ws,cs);});
  var eq=lcs(nA,nB);
  var ops=[],ai=0,bi=0;
  for(var k=0;k<eq.length;k++){
    while(ai<eq[k].ai&&bi<eq[k].bi){ops.push({t:'mod',ai:ai,bi:bi});ai++;bi++;}
    while(ai<eq[k].ai){ops.push({t:'del',ai:ai});ai++;}
    while(bi<eq[k].bi){ops.push({t:'add',bi:bi});bi++;}
    ops.push({t:'eq',ai:ai,bi:bi});ai++;bi++;
  }
  while(ai<lA.length&&bi<lB.length){ops.push({t:'mod',ai:ai,bi:bi});ai++;bi++;}
  while(ai<lA.length){ops.push({t:'del',ai:ai});ai++;}
  while(bi<lB.length){ops.push({t:'add',bi:bi});bi++;}
  var added=0,deleted=0,modified=0,html=[];
  for(var i=0;i<ops.length;i++){
    var o=ops[i];
    html.push('<div class="dr">');
    if(o.t==='eq'){
      html.push('<div class="dc"><span class="ln">'+(o.ai+1)+'</span><span class="lc">'+esc(lA[o.ai])+'</span></div>');
      html.push('<div class="dc"><span class="ln">'+(o.bi+1)+'</span><span class="lc">'+esc(lB[o.bi])+'</span></div>');
    }else if(o.t==='del'){
      deleted++;
      html.push('<div class="dc r"><span class="ln">'+(o.ai+1)+'</span><span class="lc">'+esc(lA[o.ai])+'</span></div>');
      html.push('<div class="dc e"><span class="ln"></span><span class="lc"></span></div>');
    }else if(o.t==='add'){
      added++;
      html.push('<div class="dc e"><span class="ln"></span><span class="lc"></span></div>');
      html.push('<div class="dc a"><span class="ln">'+(o.bi+1)+'</span><span class="lc">'+esc(lB[o.bi])+'</span></div>');
    }else{
      modified++;
      var cd=charDiff(lA[o.ai],lB[o.bi]);
      html.push('<div class="dc m"><span class="ln">'+(o.ai+1)+'</span><span class="lc">'+cd.left+'</span></div>');
      html.push('<div class="dc m"><span class="ln">'+(o.bi+1)+'</span><span class="lc">'+cd.right+'</span></div>');
    }
    html.push('</div>');
  }
  document.getElementById('diffBody').innerHTML=html.join('');
  document.getElementById('diffWrap').classList.add('show');
  document.getElementById('stats').innerHTML=
    '<div class="st"><span class="d da"></span>Added: <span class="n">'+added+'</span></div>'+
    '<div class="st"><span class="d dd"></span>Deleted: <span class="n">'+deleted+'</span></div>'+
    '<div class="st"><span class="d dm"></span>Modified: <span class="n">'+modified+'</span></div>';
}
function clearAll(){
  document.getElementById('textA').value='';
  document.getElementById('textB').value='';
  document.getElementById('diffBody').innerHTML='';
  document.getElementById('diffWrap').classList.remove('show');
  document.getElementById('stats').innerHTML='';
}
</script>
<script src="https://alwingulla.com/88/tag.min.js" data-zone="130747" async data-cfasync="false"></script>
</body>
</html>
